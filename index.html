<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><title>峻峻数学大冒险</title><link rel="stylesheet" href="./style.css"></head><body><main class="app">
<section class="hero"><div class="top"><div><h1 id="title">峻峻数学大冒险</h1><div id="ver">V3.0 简体版</div></div><div class="voiceControls"><select id="voiceLang" class="voiceSelect" aria-label="朗读语言"><option value="zh-CN-female">普通话·女声</option><option value="zh-CN-male">普通话·男声</option><option value="zh-HK-female">广东话·女声</option><option value="zh-HK-male">广东话·男声</option></select><button id="voiceTest" class="sound">▶️ 试听</button><button id="sound" class="sound">🔊 声音开</button></div></div><div id="voiceStatus" class="voiceStatus">正在检测系统语音…</div><div class="stats"><div class="stat"><b id="stars">0</b>⭐ 星星</div><div class="stat"><b id="done">0</b>🏁 完成</div><div class="stat"><b id="acc">—</b>🎯 正确率</div></div></section>
<nav class="tabs"><button class="tab active" data-tab="home">🗺️ 课程</button><button class="tab" data-tab="game">🎮 闯关</button><button class="tab" data-tab="report">📊 家长报告</button></nav>
<div id="loadError" class="error hidden"><b>外接资料未加载。</b><br>请确认仓库首页有 config.js、courses.js、questions.js。</div>
<section id="home" class="panel active"><div id="gradeSelect"><h2>峻峻要学哪个年级？</h2><div class="gradeChooser"><button class="grade g1" data-grade="1"><div class="big">🌱</div><h2>一年级复习</h2><div>5000题：100以内与综合思维</div></button><button class="grade g2" data-grade="2"><div class="big">🚀</div><h2>二年级主课程</h2><div>5000题：同步提高与综合挑战</div></button></div></div>
<div id="courseArea" class="hidden"><div class="courseHeader"><h2 id="gradeTitle">二年级课程</h2><button id="back" class="back">← 选择年级</button></div><div id="courses" class="courses"></div></div>
<p class="note">课程、题库和音效全部外接，采用适合 iPhone 上传的平铺结构。</p></section>
<section id="game" class="panel"><div class="card"><div class="courseHeader"><b id="gameTitle">请先选择课程</b><span id="count"></span></div><div class="progress"><div id="fill" class="fill"></div></div><div id="question" class="question">请到“课程”选择关卡</div><div id="options" class="options"></div><div id="feedback" class="feedback">支持普通话／广东话切换、读题和答题音效。</div><div class="actions"><button id="read" class="secondary">🔊 读题</button><button id="next" class="primary hidden">下一题 ➜</button></div></div></section>
<section id="report" class="panel"><div class="card"><h2>家长学习报告</h2><div id="reportStats" class="reportGrid"></div><h3>最近错题</h3><div id="mistakes"></div><button id="reset" class="secondary">清除记录</button><p class="note">默认家长密码：2026，可在 config.js 修改。</p></div></section>
</main><script src="./config.js"></script><script src="./courses.js"></script><script src="./questions.js"></script><script src="./app-v62.js?v=6.2.0"></script></body></html>
